<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공모주 통합 캘린더 & 수익률 관리</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #f4fbfaf5; /* 아주 연한 청록빛 바탕 */
        }

        /* 파스텔 청록 테마 커스텀 클래스 */
        .bg-teal-pastel-50 { background-color: #f0faf9; }
        .bg-teal-pastel-100 { background-color: #d1f2ef; }
        .bg-teal-pastel-200 { background-color: #a3e6e0; }
        .bg-teal-pastel-500 { background-color: #4db6ac; }
        .bg-teal-pastel-600 { background-color: #009688; }
        .bg-teal-pastel-700 { background-color: #00897b; }
        .text-teal-pastel-700 { color: #00796b; }
        .text-teal-pastel-800 { color: #00695c; }
        .border-teal-pastel-200 { border-color: #b2dfdb; }

        /* 상한가(따블, 따따블 등 대박 수익률) 특별 애니메이션 효과 */
        .super-profit-card {
            background: linear-gradient(135deg, #ffe0b2 0%, #ffc107 50%, #80cbc4 100%);
            background-size: 200% 200%;
            animation: gradientShift 4s ease infinite;
            border: 2px solid #ffb300;
            box-shadow: 0 4px 15px rgba(255, 179, 0, 0.35);
        }

        .super-profit-text {
            color: #d84315;
            font-weight: 800;
            text-shadow: 1px 1px 1px rgba(255,255,255,0.8);
            animation: pulse 1.5s infinite;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* 스크롤바 커스텀 */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: #a3e6e0;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #4db6ac;
        }
    </style>
</head>
<body class="text-gray-800 min-h-screen pb-12">

    <!-- 상단 내비게이션 바 -->
    <header class="bg-white border-b border-teal-pastel-200 sticky top-0 z-40 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center space-x-3">
                    <div class="p-2 bg-teal-pastel-100 text-teal-pastel-700 rounded-xl">
                        <i data-lucide="trending-up" class="w-6 h-6"></i>
                    </div>
                    <div>
                        <span class="font-bold text-xl text-teal-pastel-800 tracking-tight">IPO Master</span>
                        <span class="text-xs ml-2 text-teal-600 bg-teal-50 px-2 py-0.5 rounded-full border border-teal-100 font-medium">공모주 캘린더 & 수익률</span>
                    </div>
                </div>
                <div class="flex items-center space-x-2">
                    <button id="btnOpenAddModal" class="flex items-center space-x-1.5 px-4 py-2 bg-teal-pastel-600 hover:bg-teal-pastel-700 text-white rounded-lg transition font-medium text-sm shadow-sm">
                        <i data-lucide="plus-circle" class="w-4 h-4"></i>
                        <span>공모주 등록</span>
                    </button>
                    <button id="btnResetData" class="p-2 text-gray-400 hover:text-red-500 rounded-lg hover:bg-gray-100 transition" title="샘플 데이터 초기화">
                        <i data-lucide="rotate-ccw" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- 메인 레이아웃 -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-6">
        
        <!-- 대시보드 요약 (상단 카드) -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
            <div class="bg-white p-4 rounded-2xl border border-teal-pastel-200 shadow-sm flex items-center space-x-4">
                <div class="p-3 bg-blue-100 text-blue-600 rounded-xl">
                    <i data-lucide="clipboard-list" class="w-6 h-6"></i>
                </div>
                <div>
                    <p class="text-xs text-gray-500 font-medium">이달의 수요예측</p>
                    <p id="sumForecast" class="text-xl font-bold text-gray-800">0건</p>
                </div>
            </div>
            <div class="bg-white p-4 rounded-2xl border border-teal-pastel-200 shadow-sm flex items-center space-x-4">
                <div class="p-3 bg-orange-100 text-orange-600 rounded-xl">
                    <i data-lucide="wallet" class="w-6 h-6"></i>
                </div>
                <div>
                    <p class="text-xs text-gray-500 font-medium">이달의 청약 일정</p>
                    <p id="sumSubscription" class="text-xl font-bold text-gray-800">0건</p>
                </div>
            </div>
            <div class="bg-white p-4 rounded-2xl border border-teal-pastel-200 shadow-sm flex items-center space-x-4">
                <div class="p-3 bg-teal-pastel-100 text-teal-pastel-700 rounded-xl">
                    <i data-lucide="rocket" class="w-6 h-6"></i>
                </div>
                <div>
                    <p class="text-xs text-gray-500 font-medium">이달의 상장 일정</p>
                    <p id="sumListing" class="text-xl font-bold text-gray-800">0건</p>
                </div>
            </div>
            <div class="bg-white p-4 rounded-2xl border border-teal-pastel-200 shadow-sm flex items-center space-x-4">
                <div class="p-3 bg-rose-100 text-rose-600 rounded-xl">
                    <i data-lucide="percent" class="w-6 h-6"></i>
                </div>
                <div>
                    <p class="text-xs text-gray-500 font-medium">평균 상장 수익률</p>
                    <p id="avgProfitRate" class="text-xl font-bold text-rose-600">0.0%</p>
                </div>
            </div>
        </div>

        <!-- 메인 콘텐츠 영역 (2단 분할) -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <!-- 왼쪽/중앙: 월간 공모주 캘린더 (2/3 영역) -->
            <div class="lg:col-span-2 space-y-6">
                <div class="bg-white rounded-2xl border border-teal-pastel-200 shadow-sm p-6">
                    <!-- 캘린더 헤더 및 월 이동 -->
                    <div class="flex items-center justify-between mb-6">
                        <div class="flex items-center space-x-2">
                            <i data-lucide="calendar" class="w-5 h-5 text-teal-pastel-600"></i>
                            <h2 class="text-lg font-bold text-gray-800">공모주 일정 캘린더</h2>
                        </div>
                        <div class="flex items-center space-x-4">
                            <button id="btnPrevMonth" class="p-1.5 hover:bg-teal-pastel-50 rounded-lg text-gray-600 transition">
                                <i data-lucide="chevron-left" class="w-5 h-5"></i>
                            </button>
                            <span id="currentYearMonth" class="text-base font-bold text-teal-pastel-800">2026년 06월</span>
                            <button id="btnNextMonth" class="p-1.5 hover:bg-teal-pastel-50 rounded-lg text-gray-600 transition">
                                <i data-lucide="chevron-right" class="w-5 h-5"></i>
                            </button>
                        </div>
                    </div>

                    <!-- 캘린더 범례(Legend) -->
                    <div class="flex flex-wrap gap-2 mb-4 text-xs">
                        <span class="flex items-center space-x-1 px-2.5 py-1 rounded-full bg-blue-50 text-blue-700 border border-blue-100">
                            <span class="w-2 h-2 rounded-full bg-blue-500"></span>
                            <span>수요예측</span>
                        </span>
                        <span class="flex items-center space-x-1 px-2.5 py-1 rounded-full bg-amber-50 text-amber-700 border border-amber-100">
                            <span class="w-2 h-2 rounded-full bg-amber-500"></span>
                            <span>청약</span>
                        </span>
                        <span class="flex items-center space-x-1 px-2.5 py-1 rounded-full bg-teal-50 text-teal-700 border border-teal-100">
                            <span class="w-2 h-2 rounded-full bg-teal-500"></span>
                            <span>상장</span>
                        </span>
                        <span class="flex items-center space-x-1 px-2.5 py-1 rounded-full bg-gradient-to-r from-amber-100 to-yellow-200 text-amber-800 border border-yellow-300 font-bold">
                            <span class="w-2 h-2 rounded-full bg-red-500 animate-ping"></span>
                            <span>상한가(따블 이상)</span>
                        </span>
                    </div>

                    <!-- 캘린더 본체 -->
                    <div class="overflow-x-auto">
                        <div class="min-w-[600px]">
                            <!-- 요일 표시 -->
                            <div class="grid grid-cols-7 gap-1 text-center font-semibold text-xs text-gray-500 border-b pb-2">
                                <div class="text-rose-500">일</div>
                                <div>월</div>
                                <div>화</div>
                                <div>수</div>
                                <div>목</div>
                                <div>금</div>
                                <div class="text-blue-500">토</div>
                            </div>
                            <!-- 날짜 그리드 -->
                            <div id="calendarGrid" class="grid grid-cols-7 gap-1 mt-1 min-h-[480px]">
                                <!-- JavaScript에서 날짜 카드가 동적으로 채워집니다 -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 오른쪽: 공모주 목록 및 수익률 캘린더/리스트 (1/3 영역) -->
            <div class="space-y-6">
                <!-- 선택된 날짜 상세 일정 또는 공모주 리스트 -->
                <div class="bg-white rounded-2xl border border-teal-pastel-200 shadow-sm p-5">
                    <div class="flex items-center justify-between mb-4">
                        <div class="flex items-center space-x-2">
                            <i data-lucide="layers" class="w-5 h-5 text-teal-pastel-600"></i>
                            <h2 class="text-base font-bold text-gray-800">공모주 데이터 목록</h2>
                        </div>
                        <span id="selectedDateDisplay" class="text-xs bg-teal-pastel-50 text-teal-pastel-700 px-2.5 py-1 rounded-md font-medium border border-teal-pastel-200">
                            전체 일정 목록
                        </span>
                    </div>

                    <!-- 실시간 검색 및 필터 -->
                    <div class="mb-4">
                        <input type="text" id="searchIPO" placeholder="기업명 검색..." class="w-full text-xs px-3 py-2 border border-teal-pastel-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-pastel-500">
                    </div>

                    <!-- 리스트 영역 -->
                    <div id="ipoList" class="space-y-3 max-h-[580px] overflow-y-auto pr-1">
                        <!-- 동적으로 목록 생성 -->
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- 공모주 등록/수정 모달 -->
    <div id="ipoModal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center hidden p-4">
        <div class="bg-white rounded-2xl border border-teal-pastel-200 shadow-xl max-w-lg w-full max-h-[90vh] overflow-y-auto p-6">
            <div class="flex justify-between items-center pb-3 border-b border-gray-100">
                <h3 id="modalTitle" class="text-lg font-bold text-teal-pastel-800">새로운 공모주 등록</h3>
                <button id="btnCloseModal" class="text-gray-400 hover:text-gray-600 p-1 rounded-lg hover:bg-gray-100">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>

            <form id="ipoForm" class="space-y-4 mt-4">
                <input type="hidden" id="ipoId">
                
                <div>
                    <label class="block text-xs font-semibold text-gray-600 mb-1">기업명 <span class="text-red-500">*</span></label>
                    <input type="text" id="ipoName" required class="w-full text-sm px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-pastel-500 focus:outline-none" placeholder="예: 카카오뱅크">
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 mb-1">주관사</label>
                        <input type="text" id="ipoLead" class="w-full text-sm px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-pastel-500" placeholder="예: 한국투자증권">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 mb-1">공모가 (원) <span class="text-red-500">*</span></label>
                        <input type="number" id="ipoOfferingPrice" required class="w-full text-sm px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-pastel-500" placeholder="0">
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-3">
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 mb-1">수요예측 시작일</label>
                        <input type="date" id="ipoForecastStart" class="w-full text-xs px-2 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-pastel-500">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 mb-1">수요예측 종료일</label>
                        <input type="date" id="ipoForecastEnd" class="w-full text-xs px-2 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-pastel-500">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 mb-1">수요예측 경쟁률</label>
                        <input type="text" id="ipoForecastRatio" class="w-full text-xs px-2 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-pastel-500" placeholder="예: 1200:1">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 mb-1">청약 시작일 <span class="text-red-500">*</span></label>
                        <input type="date" id="ipoSubscriptionStart" required class="w-full text-xs px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-pastel-500">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 mb-1">청약 종료일 <span class="text-red-500">*</span></label>
                        <input type="date" id="ipoSubscriptionEnd" required class="w-full text-xs px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-pastel-500">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 mb-1">상장일 <span class="text-red-500">*</span></label>
                        <input type="date" id="ipoListingDate" required class="w-full text-xs px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-pastel-500">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-600 mb-1">청약 경쟁률</label>
                        <input type="text" id="ipoSubscriptionRatio" class="w-full text-xs px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-pastel-500" placeholder="예: 850:1">
                    </div>
                </div>

                <div class="border-t border-dashed border-teal-pastel-200 my-4 pt-3">
                    <span class="text-xs font-bold text-teal-pastel-800 flex items-center gap-1 mb-2">
                        <i data-lucide="bar-chart-2" class="w-4 h-4"></i>
                        상장 당일 시세 정보 (선택 사항 - 수익률 자동 계산)
                    </span>
                    <div class="grid grid-cols-3 gap-2">
                        <div>
                            <label class="block text-[10px] font-semibold text-gray-500 mb-1">시가 (원)</label>
                            <input type="number" id="ipoOpenPrice" class="w-full text-sm px-2 py-1.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-pastel-500" placeholder="0">
                        </div>
                        <div>
                            <label class="block text-[10px] font-semibold text-gray-500 mb-1">종가 (원)</label>
                            <input type="number" id="ipoClosePrice" class="w-full text-sm px-2 py-1.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-pastel-500" placeholder="0">
                        </div>
                        <div>
                            <label class="block text-[10px] font-semibold text-gray-500 mb-1">현재가 (원)</label>
                            <input type="number" id="ipoCurrentPrice" class="w-full text-sm px-2 py-1.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-pastel-500" placeholder="0">
                        </div>
                    </div>
                </div>

                <div class="flex justify-end space-x-2 pt-2 border-t border-gray-100">
                    <button type="button" id="btnDeleteIPO" class="hidden px-4 py-2 bg-rose-50 hover:bg-rose-100 text-rose-600 rounded-lg font-medium text-sm transition">
                        삭제
                    </button>
                    <div class="flex-grow"></div>
                    <button type="button" id="btnCancelModal" class="px-4 py-2 bg-gray-100 hover:bg-gray-200 text-gray-600 rounded-lg font-medium text-sm transition">
                        취소
                    </button>
                    <button type="submit" class="px-4 py-2 bg-teal-pastel-600 hover:bg-teal-pastel-700 text-white rounded-lg font-medium text-sm transition shadow-sm">
                        저장하기
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- 알림 모달 (브라우저 Alert 대체) -->
    <div id="alertModal" class="fixed inset-0 bg-black/40 z-50 flex items-center justify-center hidden p-4">
        <div class="bg-white rounded-xl shadow-lg max-w-sm w-full p-5 text-center">
            <div class="w-12 h-12 rounded-full bg-teal-50 text-teal-600 flex items-center justify-center mx-auto mb-3">
                <i data-lucide="info" class="w-6 h-6"></i>
            </div>
            <p id="alertMessage" class="text-sm font-medium text-gray-700 mb-4">안내 말씀 드립니다.</p>
            <button id="btnAlertConfirm" class="w-full py-2 bg-teal-pastel-600 hover:bg-teal-pastel-700 text-white rounded-lg font-medium text-xs transition">
                확인
            </button>
        </div>
    </div>

    <script>
        // ----------------------------------------------------
        // 초기 데이터 (가상 공모주 데이터 - 2026년 6월 타겟)
        // ----------------------------------------------------
        const initialIpos = [

        // ----------------------------------------------------

        // ----------------------------------------------------

        function loadData() {
            const stored = localStorage.getItem("ipo_master_data");
            if (stored) {
                try {
                    ipos = JSON.parse(stored);
                } catch(e) {
                    ipos = [...initialIpos];
                }
            } else {
                ipos = [...initialIpos];
                saveData();
            }
        }

        function saveData() {
            localStorage.setItem("ipo_master_data", JSON.stringify(ipos));

        // 알림 기능 모달화

        // ----------------------------------------------------
        // 비즈니스 로직 & 렌더링
        // ----------------------------------------------------
        
        // 수익률 및 대박(상한가) 기준 정의
        // 공모가 대비 종가 수익률이 +100% 이상(2배 이상)이거나 당일 고가권 제한에 걸렸을 때 특별 컬러/애니메이션 표시
        function calculateProfitRate(offeringPrice, targetPrice) {
            if (!offeringPrice || !targetPrice || offeringPrice === 0) return 0;
            return ((targetPrice - offeringPrice) / offeringPrice) * 100;
        }

        // 상한가 판정 (한국 규정: 공모가 대비 최대 400% 즉, +300% 달성 또는 이달의 상징적 초고수익률 100% 이상 대박주)
        function isSuperProfit(offeringPrice, closePrice) {
            if (!offeringPrice || !closePrice) return false;
            const rate = calculateProfitRate(offeringPrice, closePrice);
            return rate >= 100.0; // 수익률 100% 이상 (따블 이상)
        }

        function updateDashboard() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth(); // 0-11

            // 해당 월에 걸쳐있는 모든 일정 계산
            let forecastCount = 0;
            let subCount = 0;
            let listCount = 0;

            let totalProfitRateSum = 0;
            let profitCount = 0;

            ipos.forEach(ipo => {
                // 이달의 일정 체크용 헬퍼
                const isThisMonth = (dateStr) => {
                    if (!dateStr) return false;
                    const d = new Date(dateStr);
                    return d.getFullYear() === year && d.getMonth() === month;
                };

                // 수요예측
                if (isThisMonth(ipo.forecastStart) || isThisMonth(ipo.forecastEnd)) {
                    forecastCount++;
                }
                // 청약
                if (isThisMonth(ipo.subscriptionStart) || isThisMonth(ipo.subscriptionEnd)) {
                    subCount++;
                }
                // 상장
                if (isThisMonth(ipo.listingDate)) {
                    listCount++;
                }

                // 평균 수익률 산출 (이미 상장하여 종가 데이터가 있는 것 기준)
                if (ipo.listingDate && ipo.offeringPrice && ipo.closePrice && ipo.closePrice > 0) {
                    const profitRate = calculateProfitRate(ipo.offeringPrice, ipo.closePrice);
                    totalProfitRateSum += profitRate;
                    profitCount++;
                }
            });

            sumForecast.innerText = `${forecastCount}건`;
            sumSubscription.innerText = `${subCount}건`;
            sumListing.innerText = `${listCount}건`;

            if (profitCount > 0) {
                const avg = (totalProfitRateSum / profitCount).toFixed(1);
                avgProfitRate.innerText = `${avg}%`;
                if (avg > 0) {
                    avgProfitRate.className = "text-xl font-bold text-rose-500";
                } else if (avg < 0) {
                    avgProfitRate.className = "text-xl font-bold text-blue-500";
                } else {
                    avgProfitRate.className = "text-xl font-bold text-gray-800";
                }
            } else {
                avgProfitRate.innerText = "0.0%";
                avgProfitRate.className = "text-xl font-bold text-gray-500";
            }
        }

        // 전체 렌더링 컨트롤러
        function renderAll() {
            updateDashboard();
            renderCalendar();

        // ----------------------------------------------------
        // 캘린더 생성 기능
        // ----------------------------------------------------
        function renderCalendar() {
            calendarGrid.innerHTML = "";
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();

            currentYearMonth.innerText = `${year}년 ${(month + 1).toString().padStart(2, '0')}월`;

            // 월의 시작 요일 및 총 일수 구하기
            const firstDayIndex = new Date(year, month, 1).getDay();
            const lastDate = new Date(year, month + 1, 0).getDate();
            const prevLastDate = new Date(year, month, 0).getDate();

            // 캘린더에 표시될 칸의 모음 (이전달 잔여일수 + 이번달 + 다음달 잔여일수)
            let daysHtml = "";

            // 1. 이전달 날짜들 채우기 (연하게 표시)
            for (let i = firstDayIndex; i > 0; i--) {
                const prevDate = prevLastDate - i + 1;
                const prevMonthDateStr = formatDateStr(year, month - 1, prevDate);
                daysHtml += createDayCardHtml(prevMonthDateStr, prevDate, false);
            }

            // 2. 이번달 날짜들 채우기
            for (let d = 1; d <= lastDate; d++) {
                const currentMonthDateStr = formatDateStr(year, month, d);
                daysHtml += createDayCardHtml(currentMonthDateStr, d, true);
            }

            // 3. 다음달 날짜들 채우기
            const totalCells = firstDayIndex + lastDate;
            const remainingCells = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
            for (let i = 1; i <= remainingCells; i++) {
                const nextMonthDateStr = formatDateStr(year, month + 1, i);
                daysHtml += createDayCardHtml(nextMonthDateStr, i, false);
            }

            calendarGrid.innerHTML = daysHtml;
            setupCalendarListeners();
        }

        // 날짜를 YYYY-MM-DD 스트링으로 포맷팅
        function formatDateStr(year, monthIndex, dateNum) {
            const dateObj = new Date(year, monthIndex, dateNum);
            const y = dateObj.getFullYear();
            const m = (dateObj.getMonth() + 1).toString().padStart(2, '0');
            const d = dateObj.getDate().toString().padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        // 캘린더 개별 날짜 카드 컴포넌트 HTML 생성
        function createDayCardHtml(dateStr, dayNum, isCurrentMonth) {
            const dayEvents = getEventsForDate(dateStr);
            const isToday = getTodayStr() === dateStr;
            const isSelected = selectedDateStr === dateStr;

            // 요일 색상 구분
            const dateObj = new Date(dateStr);
            const dayOfWeek = dateObj.getDay();
            let dayColorClass = "text-gray-700";
            if (dayOfWeek === 0) dayColorClass = "text-rose-500";
            if (dayOfWeek === 6) dayColorClass = "text-blue-500";

            if (!isCurrentMonth) {
                dayColorClass = "text-gray-300";
            }

            // 오늘 표시 보더
            let todayBorder = "";
            if (isToday) {
                todayBorder = "ring-2 ring-teal-pastel-500 ring-offset-1";
            } else if (isSelected) {
                todayBorder = "ring-2 ring-amber-400 ring-offset-1";
            }

            // 이벤트 배지 생성
            let eventsMarkup = "";
            dayEvents.forEach(evt => {
                let bgClass = "bg-gray-100 text-gray-700";
                let label = "";

                // 상한가 대박주 여부 검사
                const isSuper = isSuperProfit(evt.ipo.offeringPrice, evt.ipo.closePrice);

                if (evt.type === 'forecast') {
                    bgClass = "bg-blue-50 text-blue-700 border-blue-100";
                    label = "예측";
                } else if (evt.type === 'subscription') {
                    bgClass = "bg-amber-50 text-amber-700 border-amber-100";
                    label = "청약";
                } else if (evt.type === 'listing') {
                    if (isSuper) {
                        // 상한가 기록한 상장일 일정은 더욱 화려하고 번쩍이게!
                        bgClass = "super-profit-card super-profit-text text-[10px]";
                        label = "★상장";
                    } else {
                        bgClass = "bg-teal-50 text-teal-700 border-teal-100";
                        label = "상장";
                    }
                }

                eventsMarkup += `
                    <div class="px-1 py-0.5 text-[10px] rounded-md font-semibold border ${bgClass} truncate mb-0.5 cursor-pointer hover:opacity-80 transition" 
                         onclick="event.stopPropagation(); openEditModal('${evt.ipo.id}')"
                         title="${evt.ipo.name} [${label}]">
                        ${evt.ipo.name}
                    </div>
                `;
            });

            const opacityClass = isCurrentMonth ? "" : "opacity-40";

            return `
                <div data-date="${dateStr}" class="bg-white p-1 border border-gray-100 rounded-xl flex flex-col justify-between min-h-[90px] hover:shadow-md transition ${todayBorder} ${opacityClass} cursor-pointer group">
                    <div class="flex items-center justify-between">
                        <span class="text-xs font-bold ${dayColorClass} group-hover:scale-110 transition-transform">${dayNum}</span>
                        ${isToday ? '<span class="text-[9px] bg-teal-pastel-500 text-white px-1.5 py-0.2 rounded-full font-bold">Today</span>' : ''}
                    </div>
                    <div class="flex-grow flex flex-col justify-end mt-1 overflow-hidden">
                        ${eventsMarkup}
                    </div>
                </div>
            `;
        }

        // 해당 일자 스케줄 수집
        function getEventsForDate(dateStr) {
            const list = [];
            ipos.forEach(ipo => {
                // 수요예측 기간 매핑
                if (ipo.forecastStart && ipo.forecastEnd) {
                    if (isDateBetween(dateStr, ipo.forecastStart, ipo.forecastEnd)) {
                        list.push({ type: 'forecast', ipo: ipo });
                    }
                }
                // 청약 기간 매핑
                if (ipo.subscriptionStart && ipo.subscriptionEnd) {
                    if (isDateBetween(dateStr, ipo.subscriptionStart, ipo.subscriptionEnd)) {
                        list.push({ type: 'subscription', ipo: ipo });
                    }
                }
                // 상장일 매핑
                if (ipo.listingDate && ipo.listingDate === dateStr) {
                    list.push({ type: 'listing', ipo: ipo });
                }
            });
            return list;
        }

        function isDateBetween(target, start, end) {
            return target >= start && target <= end;
        }

        function getTodayStr() {
            const today = new Date();
            const y = today.getFullYear();
            const m = (today.getMonth() + 1).toString().padStart(2, '0');
            const d = today.getDate().toString().padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        // 캘린더 날짜 클릭 리스너 설정
        function setupCalendarListeners() {
            document.querySelectorAll("#calendarGrid > div").forEach(cell => {
                cell.addEventListener("click", () => {
                    const date = cell.getAttribute("data-date");
                    selectedDateStr = date;
                    selectedDateDisplay.innerText = `${date} 일정`;
                    renderCalendar(); // 선택 마크업 갱신
                    renderIpoList(date);
                });
            });
        }


        // ----------------------------------------------------
        // 공모주 리스트 & 수익률 표시 기능
        // ----------------------------------------------------
        function renderIpoList(filterDate = "") {
            ipoList.innerHTML = "";
            const searchQuery = searchIPOInput.value.toLowerCase().trim();

            let filtered = ipos;

            // 특정 날짜 필터링이 들어온 경우
            if (filterDate) {
                filtered = ipos.filter(ipo => {
                    const insideForecast = ipo.forecastStart && ipo.forecastEnd && isDateBetween(filterDate, ipo.forecastStart, ipo.forecastEnd);
                    const insideSubscription = ipo.subscriptionStart && ipo.subscriptionEnd && isDateBetween(filterDate, ipo.subscriptionStart, ipo.subscriptionEnd);
                    const insideListing = ipo.listingDate && ipo.listingDate === filterDate;
                    return insideForecast || insideSubscription || insideListing;
                });
            }

            // 검색어 필터링
            if (searchQuery) {
                filtered = filtered.filter(ipo => ipo.name.toLowerCase().includes(searchQuery) || ipo.lead.toLowerCase().includes(searchQuery));
            }

            if (filtered.length === 0) {
                ipoList.innerHTML = `
                    <div class="text-center py-10 bg-gray-50 rounded-xl border border-dashed border-teal-pastel-200">
                        <i data-lucide="info" class="w-8 h-8 text-gray-300 mx-auto mb-2"></i>
                        <p class="text-xs text-gray-400">등록된 공모주 일정이 없습니다.</p>
                    </div>
                `;
                return;
            }

            filtered.forEach(ipo => {
                const hasPerformance = ipo.closePrice && ipo.closePrice > 0;
                const profitRate = hasPerformance ? calculateProfitRate(ipo.offeringPrice, ipo.closePrice) : 0;
                const isSuper = isSuperProfit(ipo.offeringPrice, ipo.closePrice);

                let profitColorClass = "text-gray-500 bg-gray-50";
                let profitBadge = "";

                if (hasPerformance) {
                    if (profitRate > 0) {
                        profitColorClass = "text-rose-600 bg-rose-50 border border-rose-100";
                        profitBadge = `+${profitRate.toFixed(1)}%`;
                    } else if (profitRate < 0) {
                        profitColorClass = "text-blue-600 bg-blue-50 border border-blue-100";
                        profitBadge = `${profitRate.toFixed(1)}%`;
                    } else {
                        profitColorClass = "text-gray-600 bg-gray-100 border border-gray-200";
                        profitBadge = "0.0%";
                    }
                }

                // 특별 상한가(따블 이상) 스타일 적용
                let cardClass = "bg-white border-teal-pastel-200";
                let specialTitleMarkup = "";
                if (isSuper) {
                    cardClass = "super-profit-card shadow-md";
                    specialTitleMarkup = `<span class="ml-1 text-[10px] px-1.5 py-0.2 bg-red-600 text-white rounded font-bold animate-pulse">상한가 대박🔥</span>`;
                    profitColorClass = "text-red-700 bg-amber-200 border-amber-300 font-extrabold";
                }

                const itemHtml = `
                    <div class="p-4 rounded-xl border transition hover:shadow-md cursor-pointer ${cardClass}" onclick="openEditModal('${ipo.id}')">
                        <div class="flex justify-between items-start">
                            <div>
                                <h4 class="font-bold text-sm text-teal-pastel-800 flex items-center">
                                    ${ipo.name}
                                    ${specialTitleMarkup}
                                </h4>
                                <p class="text-[11px] text-gray-400 mt-0.5">${ipo.lead || '주관사 미정'}</p>
                            </div>
                            <!-- 수익률 배지 -->
                            ${hasPerformance ? `
                                <div class="px-2 py-1 text-xs font-bold rounded-lg text-center ${profitColorClass}">
                                    ${profitBadge}
                                </div>
                            ` : `
                                <span class="text-[10px] text-gray-400 bg-gray-50 px-2 py-1 rounded border">상장전</span>
                            `}
                        </div>

                        <!-- 일정 마일스톤 -->
                        <div class="grid grid-cols-3 gap-2 mt-3 pt-2.5 border-t border-gray-100 text-[11px] text-gray-500">
                            <div>
                                <span class="block font-medium text-gray-400">수요예측</span>
                                <span class="font-semibold text-gray-700 text-[10px]">${ipo.forecastStart ? formatDateSimple(ipo.forecastStart) : '-'}</span>
                            </div>
                            <div>
                                <span class="block font-medium text-amber-600">청약일정</span>
                                <span class="font-semibold text-amber-700 text-[10px]">${ipo.subscriptionStart ? formatDateSimple(ipo.subscriptionStart) : '-'}</span>
                            </div>
                            <div>
                                <span class="block font-medium text-teal-600">상장일</span>
                                <span class="font-semibold text-teal-700 text-[10px]">${ipo.listingDate ? formatDateSimple(ipo.listingDate) : '-'}</span>
                            </div>
                        </div>

                        <!-- 시세 정보 레이아웃 -->
                        <div class="mt-2.5 pt-2 border-t border-dashed border-gray-100 flex justify-between text-xs text-gray-600">
                            <div>
                                <span class="text-[10px] text-gray-400">공모가</span>
                                <span class="font-semibold text-gray-700 block">${ipo.offeringPrice ? ipo.offeringPrice.toLocaleString() : '0'}원</span>
                            </div>
                            ${hasPerformance ? `
                                <div>
                                    <span class="text-[10px] text-gray-400">시가</span>
                                    <span class="font-semibold text-gray-700 block">${ipo.openPrice ? ipo.openPrice.toLocaleString() : '0'}원</span>
                                </div>
                                <div>
                                    <span class="text-[10px] text-gray-400">종가</span>
                                    <span class="font-semibold text-gray-700 block">${ipo.closePrice ? ipo.closePrice.toLocaleString() : '0'}원</span>
                                </div>
                                <div>
                                    <span class="text-[10px] text-gray-400">현재가</span>
                                    <span class="font-bold text-teal-pastel-700 block">${ipo.currentPrice ? ipo.currentPrice.toLocaleString() : '0'}원</span>
                                </div>
                            ` : `
                                <div class="col-span-3 flex items-center text-gray-400 text-[10px]">
                                    <i data-lucide="trending-up" class="w-3.5 h-3.5 mr-1"></i> 상장일 시가를 등록하면 수익률이 자동 계산됩니다.
                                </div>
                            `}
                        </div>
                    </div>
                `;
                ipoList.insertAdjacentHTML("beforeend", itemHtml);
            });

            lucide.createIcons();
        }

        function formatDateSimple(dateStr) {
            const parts = dateStr.split('-');
            if (parts.length < 3) return dateStr;
            return `${parts[1]}/${parts[2]}`;
        }

        // ----------------------------------------------------
        // 일정 이동 컨트롤러
        // ----------------------------------------------------
        btnPrevMonth.addEventListener("click", () => {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderAll();
        });

        btnNextMonth.addEventListener("click", () => {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderAll();
        });

        // 실시간 검색
        searchIPOInput.addEventListener("input", () => {
            renderIpoList(selectedDateStr);
        });

        // ----------------------------------------------------
        // 모달 데이터 추가 / 수정 처리
        // ----------------------------------------------------
        btnOpenAddModal.addEventListener("click", () => {
            openAddModal();
        });

        function openAddModal() {
            modalTitle.innerText = "새로운 공모주 등록";
            ipoForm.reset();
            ipoIdInput.value = "";
            btnDeleteIPO.classList.add("hidden");
            
            // 만약 선택된 날짜가 있다면 해당 일자를 기본 시작값으로 세팅 지원
            if (selectedDateStr) {
                ipoForecastStartInput.value = selectedDateStr;
                ipoForecastEndInput.value = selectedDateStr;
                ipoSubscriptionStartInput.value = selectedDateStr;
                ipoSubscriptionEndInput.value = selectedDateStr;
                ipoListingDateInput.value = selectedDateStr;
            }

            ipoModal.classList.remove("hidden");
        }

        function openEditModal(id) {
            const target = ipos.find(i => i.id === id);
            if (!target) return;

            modalTitle.innerText = "공모주 일정 및 시세 수정";
            ipoIdInput.value = target.id;
            ipoNameInput.value = target.name;
            ipoLeadInput.value = target.lead || "";
            ipoOfferingPriceInput.value = target.offeringPrice || "";
            ipoForecastStartInput.value = target.forecastStart || "";
            ipoForecastEndInput.value = target.forecastEnd || "";
            ipoForecastRatioInput.value = target.forecastRatio || "";
            ipoSubscriptionStartInput.value = target.subscriptionStart || "";
            ipoSubscriptionEndInput.value = target.subscriptionEnd || "";
            ipoSubscriptionRatioInput.value = target.subscriptionRatio || "";
            ipoListingDateInput.value = target.listingDate || "";
            ipoOpenPriceInput.value = target.openPrice || "";
            ipoClosePriceInput.value = target.closePrice || "";
            ipoCurrentPriceInput.value = target.currentPrice || "";

            btnDeleteIPO.classList.remove("hidden");
            ipoModal.classList.remove("hidden");
        }

        function closeModal() {
            ipoModal.classList.add("hidden");
            ipoForm.reset();
        }

        btnCancelModal.addEventListener("click", closeModal);
        btnCloseModal.addEventListener("click", closeModal);

        // 등록 및 수정 폼 서밋
        ipoForm.addEventListener("submit", (e) => {
            e.preventDefault();

            const id = ipoIdInput.value;
            const name = ipoNameInput.value.trim();
            const lead = ipoLeadInput.value.trim();
            const offeringPrice = parseInt(ipoOfferingPriceInput.value) || 0;
            const forecastStart = ipoForecastStartInput.value;
            const forecastEnd = ipoForecastEndInput.value;
            const forecastRatio = ipoForecastRatioInput.value.trim();
            const subscriptionStart = ipoSubscriptionStartInput.value;
            const subscriptionEnd = ipoSubscriptionEndInput.value;
            const subscriptionRatio = ipoSubscriptionRatioInput.value.trim();
            const listingDate = ipoListingDateInput.value;
            
            // 시세 정보 취득
            const openPrice = parseInt(ipoOpenPriceInput.value) || 0;
            const closePrice = parseInt(ipoClosePriceInput.value) || 0;
            const currentPrice = parseInt(ipoCurrentPriceInput.value) || 0;

            if (!name || offeringPrice === 0) {
                showNotification("기업명과 올바른 공모가 입력을 확인해주세요.");
                return;
            }

            if (id) {
                // 수정 처리
                const idx = ipos.findIndex(i => i.id === id);
                if (idx !== -1) {
                    ipos[idx] = {
                        id, name, lead, offeringPrice,
                        forecastStart, forecastEnd, forecastRatio,
                        subscriptionStart, subscriptionEnd, subscriptionRatio,
                        listingDate, openPrice, closePrice, currentPrice
                    };
                    showNotification("일정이 성공적으로 수정되었습니다.");
                }
            } else {
                // 신규 등록
                const newIpo = {
                    id: 'ipo-' + Date.now(),
                    name, lead, offeringPrice,
                    forecastStart, forecastEnd, forecastRatio,
                    subscriptionStart, subscriptionEnd, subscriptionRatio,
                    listingDate, openPrice, closePrice, currentPrice
                };
                ipos.push(newIpo);
                showNotification("새로운 공모주 일정이 추가되었습니다.");
            }

            saveData();
            closeModal();
            renderAll();
        });

        // 삭제 처리
        btnDeleteIPO.addEventListener("click", () => {
            const id = ipoIdInput.value;
            if (!id) return;

            // 커스텀 Confirm 대용
            if (confirm("정말로 해당 공모주 일정을 삭제하시겠습니까?")) {
                ipos = ipos.filter(i => i.id !== id);
                saveData();
                closeModal();
                renderAll();
                showNotification("삭제가 완료되었습니다.");
            }
        });

        // 데이터 초기화 버튼
        btnResetData.addEventListener("click", () => {
            if (confirm("기존 입력된 일정을 모두 지우고 샘플 데이터로 복원하시겠습니까?")) {
                ipos = [...initialIpos];
                saveData();
                selectedDateStr = "";
                selectedDateDisplay.innerText = "전체 일정 목록";
                renderAll();
                showNotification("샘플 데이터로 초기화 완료되었습니다.");
            }
        });

    </script>
</body>
</html>
